<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V48 D2+D3 (动量减速+连涨惩罚)</title>
  <script>
    // Set theme before CSS parses to avoid FOUC
    document.documentElement.setAttribute(
      'data-theme',
      (function () { try { return localStorage.getItem('bt-theme') || 'light'; } catch (e) { return 'light'; } })()
    );
  </script>
  <style>
    /* ---------------- design tokens ---------------- */
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-elev: #131722;
      --surface: #161b22;
      --surface-2: #1c2030;
      --hover: #1f2433;
      --border: #1f2230;
      --border-strong: #2a2e3e;
      --text: #d1d4dc;
      --text-strong: #f0f3fa;
      --muted: #787b86;
      --muted-2: #50535e;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.18);
      --gain: #26a69a;
      --gain-strong: #2dd4bf;
      --gain-glow: rgba(38, 166, 154, 0.18);
      --loss: #ef5350;
      --loss-strong: #f87171;
      --loss-glow: rgba(239, 83, 80, 0.18);
      --warn: #ff9800;
      --neutral: #b2b5be;
      --grid: rgba(255, 255, 255, 0.04);
      --grid-strong: rgba(255, 255, 255, 0.10);
      --crosshair: rgba(160, 167, 184, 0.50);
      --shadow-soft: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.32);
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-elev: #f8f9fc;
      --surface: #ffffff;
      --surface-2: #f3f5f9;
      --hover: #eef1f8;
      --border: #e6e8ee;
      --border-strong: #d6dae3;
      --text: #131722;
      --text-strong: #0a0d14;
      --muted: #6a6d78;
      --muted-2: #8c8f99;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.12);
      --gain: #089981;
      --gain-strong: #00a884;
      --gain-glow: rgba(8, 153, 129, 0.12);
      --loss: #f23645;
      --loss-strong: #ef4444;
      --loss-glow: rgba(242, 54, 69, 0.12);
      --warn: #ff9800;
      --neutral: #4a4d57;
      --grid: rgba(0, 0, 0, 0.04);
      --grid-strong: rgba(0, 0, 0, 0.08);
      --crosshair: rgba(60, 65, 80, 0.45);
      --shadow-soft: 0 1px 0 rgba(0,0,0,0.02) inset, 0 6px 24px rgba(19,23,34,0.06);
    }

    /* Eastern color convention (A-share / HK): 涨红跌绿 — swap gain/loss palette */
    :root[data-theme="dark"][data-color-scheme="eastern"] {
      --gain: #ef5350;
      --gain-strong: #f87171;
      --gain-glow: rgba(239, 83, 80, 0.18);
      --loss: #26a69a;
      --loss-strong: #2dd4bf;
      --loss-glow: rgba(38, 166, 154, 0.18);
    }
    :root[data-theme="light"][data-color-scheme="eastern"] {
      --gain: #f23645;
      --gain-strong: #ef4444;
      --gain-glow: rgba(242, 54, 69, 0.12);
      --loss: #089981;
      --loss-strong: #00a884;
      --loss-glow: rgba(8, 153, 129, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
      font-feature-settings: 'tnum' 1, 'cv11' 1, 'ss01' 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ---------------- topbar ---------------- */
    .topbar {
      height: 50px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      gap: 16px;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tb-left, .tb-right { display: flex; align-items: center; gap: 12px; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-strong);
    }
    .brand-logo {
      width: 24px; height: 24px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent) 0%, #6b8eff 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
      letter-spacing: 0;
    }
    .brand-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }
    .brand-strategy {
      color: var(--muted);
      font-weight: 500;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .menu-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      cursor: default;
      user-select: none;
    }
    .menu-chip:hover { background: var(--hover); }
    .menu-chip.active {
      background: var(--surface-2);
      border-color: var(--border);
      font-weight: 600;
      color: var(--text-strong);
    }

    .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); display: inline-block; }
    .dot.green { background: var(--gain); box-shadow: 0 0 0 2px var(--gain-glow); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .icon-btn:hover {
      background: var(--hover);
      color: var(--text-strong);
      border-color: var(--border-strong);
    }

    /* ---------------- page ---------------- */
    .page {
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 28px 56px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 4px 0 24px;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .report-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-strong);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .symbol-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
      letter-spacing: 0.02em;
    }

    .report-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pulse {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--gain);
      animation: pulse 2.4s ease-out infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0.55); }
      70%  { box-shadow: 0 0 0 8px rgba(38, 166, 154, 0); }
      100% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0); }
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      font-feature-settings: 'tnum';
    }
    .date-badge .arrow { color: var(--muted); }

    /* ---------------- tabs ---------------- */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
      position: relative;
      flex-wrap: wrap;
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
      font-family: inherit;
      letter-spacing: -0.005em;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text-strong); font-weight: 600; }
    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transition: transform 0.4s cubic-bezier(0.5, 0, 0.2, 1), width 0.4s cubic-bezier(0.5, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tab-panels { display: block; }
    .tab-panel {
      display: none;
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .tab-panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- modules ---------------- */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }

    .module {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .module.span-6 { grid-column: span 6; }
    .module.span-4 { grid-column: span 4; }
    .module.span-8 { grid-column: span 8; }

    .module-grid > .module:nth-child(1) { animation-delay: 0.05s; }
    .module-grid > .module:nth-child(2) { animation-delay: 0.12s; }
    .module-grid > .module:nth-child(3) { animation-delay: 0.18s; }
    .module-grid > .module:nth-child(4) { animation-delay: 0.24s; }
    .module-grid > .module:nth-child(5) { animation-delay: 0.30s; }

    .module-header {
      padding: 22px 24px 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .module-header > div:first-child {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .module-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      color: var(--text-strong);
      letter-spacing: -0.01em;
      line-height: 1.25;
    }
    .module-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }
    .module-body { padding: 18px 22px; }

    /* ---------------- KPI strip ---------------- */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
    }
    .kpi-item { min-width: 0; }
    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-strong);
      font-feature-settings: 'tnum';
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kpi-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-feature-settings: 'tnum';
    }

    .positive { color: var(--gain) !important; }
    .negative { color: var(--loss) !important; }

    /* ---------------- chart card ---------------- */
    .tv-chart-card { padding: 0; }
    .tv-chart-top {
      padding: 22px 24px 20px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tv-chart-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
      flex: 1;
    }

    .tv-chart-area { padding: 0; position: relative; }

    .chart-shell {
      width: 100%;
      height: 460px;
      position: relative;
      background: transparent;
    }
    .chart-shell svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .chart-shell svg text { font-family: inherit; }

    .chart-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 24px 16px;
      border-top: 1px solid var(--border);
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }
    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-item:hover { background: var(--hover); }
    .toggle-item.muted { color: var(--muted-2); }
    .toggle-item.muted .toggle-swatch { opacity: 0.35; }
    .toggle-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      background: var(--gain);
      transition: opacity 0.15s;
    }
    /* Marker legend lives inside toggle-row, separated by a divider.
       Items are informational (not clickable) so they don't carry .toggle-item. */
    .legend-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 6px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 4px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }
    .legend-item svg { display: block; }

    .mode-switch {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .mode-chip {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }
    .mode-chip:hover { color: var(--text); }
    .mode-chip.active {
      background: var(--bg);
      color: var(--text-strong);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    /* ---------------- tooltip ---------------- */
    .tooltip {
      position: absolute;
      top: 18px;
      left: 18px;
      background: color-mix(in srgb, var(--surface-2) 92%, transparent);
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      padding: 12px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 5;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      font-feature-settings: 'tnum';
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.12s ease;
    }
    .tooltip.hidden { opacity: 0; }
    .tooltip-date {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 9px;
      font-weight: 600;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 3px 0;
    }
    .tooltip-row .key {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tooltip-row .key::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: var(--swatch, var(--accent));
      flex-shrink: 0;
    }
    .tooltip-row .val {
      color: var(--text-strong);
      font-weight: 600;
    }

    /* ---------------- tables ---------------- */
    .metric-table {
      width: 100%;
      border-collapse: collapse;
      font-feature-settings: 'tnum';
    }
    .metric-table-wrap { overflow-x: auto; }
    .metric-table th, .metric-table td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: middle;
    }
    .metric-table th:first-child, .metric-table td:first-child {
      text-align: left;
      width: 40%;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      white-space: normal;
    }
    .metric-table th:not(:first-child), .metric-table td:not(:first-child) { white-space: nowrap; }
    .metric-table td:not(:first-child) {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
    }
    .metric-table thead th {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .metric-table tbody tr { transition: background 0.12s ease; }
    .metric-table tbody tr:hover { background: var(--hover); }
    .metric-table tbody tr:last-child td { border-bottom: 0; }
    .metric-main {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-strong);
    }
    .metric-secondary {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 500;
    }

    .trades-table-wrap { overflow-x: auto; }
    .trades-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-feature-settings: 'tnum';
    }
    .trades-table th, .trades-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .trades-table td {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-strong);
    }
    .trades-table td.num,
    .trades-table th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .trades-table thead th {
      color: var(--muted);
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      background: transparent;
      position: sticky;
      top: 0;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    .trades-table tbody tr { transition: background 0.12s ease; }
    .trades-table tbody tr:hover { background: var(--hover); }
    .trades-table tbody tr:last-child td { border-bottom: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .text-card {
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }
    .text-card > * + * { margin-top: 12px; }
    .text-card h1, .text-card h2, .text-card h3, .text-card h4, .text-card h5, .text-card h6 {
      color: var(--text-strong);
      line-height: 1.3;
      margin-top: 20px;
    }
    .text-card h1:first-child, .text-card h2:first-child, .text-card h3:first-child,
    .text-card h4:first-child, .text-card h5:first-child, .text-card h6:first-child {
      margin-top: 0;
    }
    .text-card p, .text-card ul, .text-card ol, .text-card blockquote, .text-card pre, .text-card table {
      margin: 0;
    }
    .text-card ul, .text-card ol {
      padding-left: 20px;
    }
    .text-card li + li {
      margin-top: 6px;
    }
    .text-card a {
      color: var(--accent);
      text-decoration: none;
    }
    .text-card a:hover {
      text-decoration: underline;
    }
    .text-card code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .text-card pre {
      overflow-x: auto;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .text-card pre code {
      padding: 0;
      border: 0;
      background: transparent;
    }
    .text-card blockquote {
      padding-left: 14px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    .text-card table {
      width: 100%;
      border-collapse: collapse;
      font-feature-settings: 'tnum';
    }
    .text-card th, .text-card td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    .text-card thead th {
      background: var(--surface-2);
      color: var(--text-strong);
      font-size: 12px;
      font-weight: 600;
    }
    .text-card hr {

  <script>
  (function () {
    'use strict';

    const REPORT = JSON.parse(document.getElementById('report-data').textContent || '{}');
    const ROOT = document.documentElement;

    // Color scheme: can be overridden via report_data.ui.color_scheme

    // when market is missing/unknown, default to eastern (涨红跌绿).
    (function () {
      var ui = REPORT.ui || {};
      var meta = REPORT.meta || {};
      var scheme = ui.color_scheme;
      if (!scheme) {
        var mk = String(meta.market || '').toLowerCase();
        if (mk === 'china_a' || mk === 'a股' || mk === 'cn' || mk === 'cn-stock' ||
            mk === 'hong_kong' || mk === 'hk' || mk === 'hk-stock') {
          scheme = 'eastern';
        } else if (mk === 'us_stock' || mk === 'us' || mk === 'usa' || mk === 'us-market' ||
                   mk === 'america' || mk === 'american') {
          scheme = 'western';
        } else {
          scheme = 'eastern';
        }
      }
      if (scheme === 'eastern') ROOT.setAttribute('data-color-scheme', 'eastern');
      else ROOT.setAttribute('data-color-scheme', 'western');
    })();

    // i18n bag from report_data.ui.i18n; fallbacks keep behavior backward-compatible
    // for older payloads (default is Chinese — the skill is Chinese-first).
    const I18N = (REPORT.ui && REPORT.ui.i18n) || {};
    function t(key, fallback) {
      return I18N[key] != null ? I18N[key] : fallback;
    }

    // ---------------- format helpers ----------------
    function parseNumeric(value) {
      if (value == null) return null;
      if (typeof value === 'number') return Number.isFinite(value) ? value : null;
      var text = String(value).trim();
      if (!text) return null;
      var negativeByParens = false;
      if (/^\(.*\)$/.test(text)) {
        negativeByParens = true;
        text = text.slice(1, -1).trim();
      }
      text = text
        .replace(/,/g, '')
        .replace(/%/g, '')
        .replace(/\s+/g, '')
        .replace(/\u2212/g, '-');
      if (!text) return null;
      var num = Number(text);
      if (!Number.isFinite(num)) return null;
      return negativeByParens ? -Math.abs(num) : num;
    }
    function nf(value, digits) {
      if (digits == null) digits = 2;
      var num = parseNumeric(value);
      if (num == null) return '--';
      return num.toLocaleString('en-US', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }
    function pf(value, digits) {
      if (digits == null) digits = 2;
      var num = parseNumeric(value);
      if (num == null) return '--';
      return nf(num, digits) + '%';
    }
    function signed(value, digits, suffix) {
      if (digits == null) digits = 2;
      if (suffix == null) suffix = '';
      const num = parseNumeric(value);
      if (num == null) return '--';
      return (num > 0 ? '+' : '') + nf(num, digits) + suffix;
    }
    function signClass(value) {
      const num = parseNumeric(value);
      if (num == null) return '';
      return num >= 0 ? 'positive' : 'negative';
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function renderMarkdownFallback(s) {
      if (s == null) return '';
      var text = escapeHtml(String(s));
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    function renderMarkdown(s) {
      if (s == null) return '';
      var source = String(s);
      if (window.marked && typeof window.marked.parse === 'function') {
        try {
          var rendered = window.marked.parse(source, {
            gfm: true,
            breaks: true,
            headerIds: false,
            mangle: false,
          });
          if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
            return window.DOMPurify.sanitize(rendered);
          }
          console.warn('DOMPurify unavailable, falling back to basic markdown renderer.');
        } catch (e) {
          console.warn('markdown render failed, falling back to basic renderer:', e);
        }
      }
      return renderMarkdownFallback(source);
    }
    function axisLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      if (!raw) return '';
      const text = String(raw);
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text.slice(5);
      if (/^\d{4}-\d{2}$/.test(text)) return text;
      return text;
    }
    function fullLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      return raw ? String(raw) : '';
    }

    // ---------------- topbar ----------------
    function renderTopbar(meta, ui) {
      const left = document.getElementById('topbar-left');

      left.innerHTML = leftHtml;

      const themeBtn =
        '<button class="icon-btn" id="theme-toggle" title="Toggle theme">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +

        '</button>';
      right.innerHTML =

      document.getElementById('theme-toggle').addEventListener('click', function () {

        const next = cur === 'dark' ? 'light' : 'dark';
        ROOT.setAttribute('data-theme', next);
        try { localStorage.setItem('bt-theme', next); } catch (e) { /* ignore */ }
      });
    }

    function renderHeader(meta, ui) {
      const titleEl = document.getElementById('report-title');
      const subtitleEl = document.getElementById('report-subtitle');
      const dateEl = document.getElementById('report-date');

      const strategy = escapeHtml((meta && meta.strategy_name) || 'Strategy');
      const symbol = (meta && meta.symbol) || '';
      titleEl.innerHTML = strategy + (symbol ? ' <span class="symbol-badge">' + escapeHtml(symbol) + '</span>' : '');

      const subtitle = (ui && ui.subtitle) || t('subtitle_fallback', '回测看板');
      subtitleEl.innerHTML = '<span class="live-pulse"></span>' + escapeHtml(subtitle);

      const start = (meta && meta.start) || '--';
      const end = (meta && meta.end) || '--';
      dateEl.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>' +
          '<line x1="16" y1="2" x2="16" y2="6"/>' +
          '<line x1="8" y1="2" x2="8" y2="6"/>' +
          '<line x1="3" y1="10" x2="21" y2="10"/>' +
        '</svg>' +
        escapeHtml(start) + '<span class="arrow">→</span>' + escapeHtml(end);
    }

    // ---------------- module render ----------------
    function renderKpi(item) {
      return (
        '<div class="kpi-item">' +
          '<div class="kpi-label">' + escapeHtml(item.label) + '</div>' +
          '<div class="kpi-value ' + signClass(item.raw) + '">' + escapeHtml(item.value) + '</div>' +
          (item.subvalue ? '<div class="kpi-sub ' + signClass(item.subraw) + '">' + escapeHtml(item.subvalue) + '</div>' : '') +
        '</div>'
      );
    }

    function formatMetricCell(metric) {
      const main = metric && metric.main !== undefined ? metric.main : '--';
      const secondary = metric && metric.secondary !== undefined ? metric.secondary : '';
      const cls = signClass(metric && metric.raw);
      return (
        '<div class="metric-main ' + cls + '">' + escapeHtml(main) + '</div>' +
        (secondary ? '<div class="metric-secondary ' + cls + '">' + escapeHtml(secondary) + '</div>' : '')
      );
    }

    function renderModule(module, idx) {
      const span =
        module.width === 'half' ? 'span-6' :
        module.width === 'third' ? 'span-4' :

      const titleHtml = module.title

            (module.subtitle ? '<p class="module-subtitle">' + escapeHtml(module.subtitle) + '</p>' : '') +
          '</div></div>'
        : '';

      if (module.type === 'stats_strip') {
        const items = module.items || [];
        return (
          '<article class="module ' + span + '" data-module="' + idx + '">' +
            titleHtml +
            '<div class="module-body"><div class="kpi-strip">' +
              items.map(renderKpi).join('') +
            '</div></div>' +
          '</article>'
        );
      }

      if (module.type === 'overview_chart') {
        const stats = module.stats || [];
        const toggles = module.toggles || [];
        const modes = module.modes || [];
        // Marker legend: which action types actually appear in this module's markers?
        // Only show legend entries for actions that are present, so a long-only
        // strategy doesn't get cluttered with short/cover entries.
        const legendActions = new Set();

          const a = (m.action || '').toLowerCase();
          if (a) legendActions.add(a);
        });
        // Inline SVG triangles that visually match the chart markers.
        // entry actions point UP (apex on top), exit actions point DOWN.
        function legendTri(direction, color) {
          // 12x10 viewBox; up triangle apex at (6,1), down triangle apex at (6,9)
          const points = direction === 'up'
            ? '6,1 1,9 11,9'
            : '6,9 1,1 11,1';
          return '<svg width="12" height="10" viewBox="0 0 12 10">' +
            '<polygon points="' + points + '" fill="' + color + '" />' +
            '</svg>';
        }
        const LEGEND_DEFS = [
          { action: 'buy',   dir: 'up',   color: 'var(--gain)', label: t('marker_buy',   '买入') },
          { action: 'sell',  dir: 'down', color: 'var(--loss)', label: t('marker_sell',  '卖出') },
          { action: 'short', dir: 'up',   color: 'var(--loss)', label: t('marker_short', '做空') },
          { action: 'cover', dir: 'down', color: 'var(--gain)', label: t('marker_cover', '平空') },
        ];
        const legendHtml = LEGEND_DEFS
          .filter(function (def) { return legendActions.has(def.action); })
          .map(function (def) {
            return '<span class="legend-item">' +
              legendTri(def.dir, def.color) +
              escapeHtml(def.label) +
            '</span>';
          })
          .join('');
        return (
          '<article class="module tv-chart-card ' + span + '" data-module="' + idx + '">' +
            '<div class="tv-chart-top"><div class="tv-chart-stats">' +
