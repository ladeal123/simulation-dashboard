name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl
      
      - name: Run Simulation & Update Dashboard
        env:
          DATA_DIR: ${{ github.workspace }}/data
          OUT_DIR: ${{ github.workspace }}/data
        run: |
          python scripts/sim_V46_v62_v20_consec.py
          EXCEL=$(ls -t data/模拟盘_V46_v62_v20_consec_*.xlsx 2>/dev/null | head -1)
          if [ -n "$EXCEL" ]; then
            python scripts/build_dashboard.py "$EXCEL" data_consec.js
            cp data/data_consec.js docs/
          fi
      
      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "每日更新 $(date -u '+%Y-%m-%d')"
          git push
